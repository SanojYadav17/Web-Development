<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel = "stylesheet" href = "registration_form.css"/>
</head>
<body>
    <h1>Student Registraion Form</h1>
    <div class="container">

    <form>
        <label for="first name">First Name:</label>
        <input type="text" id = "first_name" placeholder="Enter your First name" required>
        <br><br>

        <label for="last name">Last Name:</label>
        <input type="text" id = "last_name" placeholder="Enter your Last name" required>
        <br><br>

        <label for="roll number">Roll Number:</label>
        <input type="number" id = "Roll_number"  placeholder="Enter your Roll Number" required>
        <br><br>

        <label for="phone number">Phone Number:</label>
        <input type="tel" id = "Phone_number" placeholder="Enter your Phone Number" required>
        <br><br>

        <label for="dob">DOB:</label>
        <input type="date" id = "DOB" placeholder="Enter your DOB" required>
        <br><br>     
        
        <label for="email">Email:</label>
        <input type="email" id = "Email" placeholder="Enter your email" required>
        <br><br>

        <label for="password">Password:</label>
        <input type="password" id = "Password" placeholder = "Enter your Password" required>
        <br><br>  

        <label for="address">Address:</label>
        <textarea id = "Address" placeholder="Enter your Address" required></textarea>
        <br><br> 

        <button type="submit" Value  = "Submit" class = "btn">Submit</button>

        <button type="reset" Value  = "Reset" class = "btn">Reset</button>

    </form>
    </div>
</body>
</html>
