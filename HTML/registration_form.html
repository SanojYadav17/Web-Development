<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Student Details</h1>

    <form>
        <label for="first name">First Name:</label><br>
        <input type="text" placeholder="Enter your First name" required>
        <br><br>

        <label for="last name">Last Name:</label><br>
        <input type="text" placeholder="Enter your Last name" required>
        <br><br>

        <label for="roll number">Roll Number:</label><br>
        <input type="number" placeholder="Enter your Roll Number" required>
        <br><br>

        <label for="phone number">Phone Number:</label><br>
        <input type="tel" placeholder="Enter your Phone Number" required>
        <br><br>

        <label for="dob">Name:</label><br>
        <input type="date" placeholder="Enter your DOB" required>
        <br><br>     
        
        <label for="email">Email:</label><br>
        <input type="email" placeholder="Enter your email" required>
        <br><br>

        <label for="password">Password:</label><br>
        <input type="password" placeholder="Enter your Password" required>
        <br><br>  

        <label for="address">Address:</label><br>
        <textarea type="text" rows ="4" cols ="30" placeholder="Enter your Address" required></textarea>
        <br><br> 

        <button type="submit">Submit</button>

        <button type="reset">Reset</button>
    </form>
</body>
</html>
